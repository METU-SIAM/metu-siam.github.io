<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}METU SIAM Student Chapter</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <span class="brand-title">METU SIAM</span>
        <span class="brand-subtitle">Student Chapter</span>
      </div>
      <nav class="nav">
        <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' or page.url == '/index.html' %}active{% endif %}">Home</a>
        <a href="{{ '/seminars.html' | relative_url }}" class="nav-link {% if page.url contains 'seminars' %}active{% endif %}">Seminars</a>
        <a href="{{ '/workshops.html' | relative_url }}" class="nav-link {% if page.url contains 'workshops' %}active{% endif %}">Workshops</a>
        <a href="{{ '/people.html' | relative_url }}" class="nav-link {% if page.url contains 'people' %}active{% endif %}">People</a>
        <a href="{{ '/resources.html' | relative_url }}" class="nav-link {% if page.url contains 'resources' %}active{% endif %}">Resources</a>
        <button id="theme-toggle" class="nav-link" type="button">Dark / Light</button>
      </nav>
    </div>
  </header>

  {{ content }}

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year"></span> METU SIAM Student Chapter. All rights reserved.</p>
      <p class="footer-meta">
        Affiliated with the Society for Industrial and Applied Mathematics (SIAM).
      </p>
    </div>
  </footer>

  <script>
    // Year in footer
    document.getElementById('year').textContent = new Date().getFullYear();

    // Theme toggle with localStorage
    (function () {
      var root = document.documentElement;
      var toggleBtn = document.getElementById('theme-toggle');
      var saved = window.localStorage ? localStorage.getItem('theme') : null;

      if (saved === 'light' || saved === 'dark') {
        root.setAttribute('data-theme', saved);
      }

      if (toggleBtn) {
        toggleBtn.addEventListener('click', function () {
          var current = root.getAttribute('data-theme') || 'dark';
          var next = current === 'dark' ? 'light' : 'dark';
          root.setAttribute('data-theme', next);
          if (window.localStorage) {
            localStorage.setItem('theme', next);
          }
        });
      }
    })();
  </script>
</body>
</html>
